<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Pad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Fixed Sound Pad</p>
        <h1>Loop Pad</h1>
        <p class="subtitle">
          s1/s2/s3タブで切り替えて、ワンタップで再生できます。
        </p>
      </header>

      <section class="controls" aria-label="global controls">
        <div id="tab-list" class="tab-list" role="tablist" aria-label="sound tabs"></div>
        <button id="stop-all" type="button" class="danger">全停止</button>
      </section>

      <section id="pad-grid" class="pad-grid" aria-label="pad grid"></section>
    </main>
    <script src="./script.js" defer></script>
  </body>
</html>
